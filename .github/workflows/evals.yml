name: evals

# "Evals, not vibes": fail the build if the scorer regresses. Runs the full offline
# stack (demo + backtest as smoke tests, evals as the regression gate) — needs only
# pyyaml, so CI is fast and key-free.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  offline-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install offline deps
        run: python -m pip install --upgrade pip pyyaml

      - name: Sourcing demo (smoke)
        run: PYTHONPATH=src python -m signalfund --demo

      - name: Scorer evals (regression gate)
        run: PYTHONPATH=src python evals/run_evals.py

      - name: network_radar convergence check (offline)
        run: PYTHONPATH=src python evals/network_radar_check.py

      - name: watchlist source check (offline)
        run: PYTHONPATH=src python evals/watchlist_check.py

      - name: credibility HARD/SOFT flag check (offline)
        run: PYTHONPATH=src python evals/credibility_check.py

      - name: LLM rate-limit retry + throttle check (offline)
        run: PYTHONPATH=src python evals/ratelimit_check.py

      - name: Messari funding/stage-gate check (offline)
        run: PYTHONPATH=src python evals/messari_check.py

      - name: Nansen onchain-upgrade + smart-money convergence check (offline)
        run: PYTHONPATH=src python evals/nansen_check.py

      - name: Phase 0 backtest demo (smoke)
        run: PYTHONPATH=src python -m signalfund.backtest --demo
